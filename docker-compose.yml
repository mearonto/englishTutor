services:
  postgres:
    image: postgres:16-alpine
    container_name: word-quest-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wordquest
      POSTGRES_USER: wordquest
      POSTGRES_PASSWORD: wordquest
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wordquest"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: word-quest-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://wordquest:wordquest@postgres:5432/wordquest
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
